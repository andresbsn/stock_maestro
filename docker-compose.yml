version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inventario_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-yourpassword}
      POSTGRES_DB: ${DB_NAME:-inventario_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: inventario_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=4000
      - DB_HOST=postgres
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-yourpassword}
      - DB_NAME=${DB_NAME:-inventario_db}
      - JWT_SECRET=${JWT_SECRET:-changethis_secret_key}
      # Add other env vars here
    ports:
      - "4000:4000"
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: inventario_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: always

volumes:
  postgres_data:
